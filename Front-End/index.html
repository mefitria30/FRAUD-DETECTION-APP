<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Detection</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body class="bg-light">

    <div class="container py-5">
        <!-- Header -->
        <div class="text-center mb-4">
            <h1 class="fw-bold text-primary">
                <i class="bi bi-shield-check"></i> Fraud Detection
            </h1>
            <p class="text-muted">Deteksi percakapan menggunakan AI & Machine Learning</p>
        </div>

        <!-- Card -->
        <div class="card shadow-lg border-0">
            <div class="card-body">
                <form id="predictForm">
                    <div class="mb-3">
                        <label for="teks" class="form-label fw-bold">Masukkan Teks Prediksi:</label>
                        <input type="text" class="form-control" id="teks"
                            placeholder="Contoh: transfer uang segera urgent">
                    </div>

                    <button type="submit" id="button_predict" class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> Prediksi
                    </button>
                </form>

                <!-- Hasil Prediksi -->
                <div id="resultCard" class="mt-4" style="display:none;">
                    <div class="card border-info">
                        <div class="card-header bg-info text-white fw-bold">
                            <i class="bi bi-bar-chart"></i> Hasil Analisis
                        </div>
                        <div class="card-body">
                            <p id="prediction" class="mb-0"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script>
        const prediction = document.getElementById( "prediction" );
        const button_predict = document.getElementById( "button_predict" );
        const resultCard = document.getElementById( "resultCard" );

        button_predict.addEventListener( 'click', async ( e ) =>
        {
            e.preventDefault();
            const teks = document.getElementById( "teks" ).value.trim();

            const response = await fetch( "https://fraud-detection-app-bhjy.onrender.com/predict", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify( { text: teks } )
            } );

            const data = await response.json();
            prediction.innerHTML = `
        <ul class="list-group">
          <li class="list-group-item"><strong>Prediction:</strong> ${ data.prediction }</li>
          <li class="list-group-item"><strong>Is Fraud:</strong> ${ data.is_fraud }</li>
          <li class="list-group-item"><strong>Fraud Probability:</strong> ${ data.fraud_probability }</li>
        </ul>`;
            resultCard.style.display = "block";
        } );
    </script>
</body>

</html>
